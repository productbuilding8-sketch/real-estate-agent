name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Change detection ─────────────────────────────────────────────────────────
  # Only run an app's jobs when its files (or this workflow) changed.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api:    ${{ steps.filter.outputs.api }}
      worker: ${{ steps.filter.outputs.worker }}
      web:    ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - '.github/workflows/ci.yml'
            worker:
              - 'apps/worker/**'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - '.github/workflows/ci.yml'

  # ── API ──────────────────────────────────────────────────────────────────────
  lint-api:
    name: Lint API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          cache: true
          cache-dependency-glob: "apps/api/uv.lock"
      - run: uv sync --extra dev
      - run: uv run ruff check src
      - run: uv run ruff format --check src

  typecheck-api:
    name: Typecheck API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          cache: true
          cache-dependency-glob: "apps/api/uv.lock"
      - run: uv sync --extra dev
      - run: uv run mypy src

  test-api:
    name: Test API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: dealflow
          POSTGRES_PASSWORD: dealflow
          POSTGRES_DB: dealflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://dealflow:dealflow@localhost:5432/dealflow_test
      REDIS_URL: redis://localhost:6379/0
      AUTH0_DOMAIN: test.auth0.com
      AUTH0_AUDIENCE: https://api.dealflow.test
      SECRET_KEY: test-secret-key-for-ci-only
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          cache: true
          cache-dependency-glob: "apps/api/uv.lock"
      - run: uv sync --extra dev
      - run: uv run pytest

  migration-check:
    name: Migration Check
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: dealflow
          POSTGRES_PASSWORD: dealflow
          POSTGRES_DB: dealflow_migration_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://dealflow:dealflow@localhost:5432/dealflow_migration_check
      SECRET_KEY: ci-only
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          cache: true
          cache-dependency-glob: "apps/api/uv.lock"
      - run: uv sync --extra dev
      - name: Apply all migrations
        run: uv run alembic upgrade head
      - name: Verify no pending model changes
        # Fails if a model was changed without a corresponding migration.
        run: uv run alembic check

  # ── Worker ───────────────────────────────────────────────────────────────────
  lint-worker:
    name: Lint Worker
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          cache: true
          cache-dependency-glob: "apps/worker/uv.lock"
      - run: uv sync --extra dev
      - run: uv run ruff check src
      - run: uv run ruff format --check src

  typecheck-worker:
    name: Typecheck Worker
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          cache: true
          cache-dependency-glob: "apps/worker/uv.lock"
      - run: uv sync --extra dev
      - run: uv run mypy src

  test-worker:
    name: Test Worker
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          cache: true
          cache-dependency-glob: "apps/worker/uv.lock"
      - run: uv sync --extra dev
      - run: uv run pytest

  # ── Web ──────────────────────────────────────────────────────────────────────
  lint-web:
    name: Lint + Typecheck Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck

  test-web:
    name: Test Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build-web:
    name: Build Web
    needs: [changes, lint-web, test-web]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      MOCK_AUTH: "true"
      NEXT_STANDALONE: "1"
      AUTH0_SECRET: ci-only-secret-not-real-but-32-chars-min
      AUTH0_BASE_URL: http://localhost:3000
      AUTH0_ISSUER_BASE_URL: https://test.auth0.com
      AUTH0_CLIENT_ID: ci-client-id
      AUTH0_CLIENT_SECRET: ci-client-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  # ── Gate ─────────────────────────────────────────────────────────────────────
  # Add "CI Gate" as the single required status check in branch protection.
  # It passes when every job either succeeded or was skipped (path filter).
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint-api
      - typecheck-api
      - test-api
      - migration-check
      - lint-worker
      - typecheck-worker
      - test-worker
      - lint-web
      - test-web
      - build-web
    steps:
      - name: All checks passed or skipped
        run: |
          results='${{ toJson(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -q '"failure"'; then
            echo "One or more required jobs failed."
            exit 1
          fi
          if echo "$results" | grep -q '"cancelled"'; then
            echo "One or more jobs were cancelled."
            exit 1
          fi
          echo "All jobs passed or were skipped."
